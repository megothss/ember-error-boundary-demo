name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout demo app
        uses: actions/checkout@v4

      - name: Checkout ember.js fork
        uses: actions/checkout@v4
        with:
          repository: megothss/ember.js
          ref: error-boundaries
          path: ember-source-fork

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Build ember-source from fork
        run: |
          cd ember-source-fork
          pnpm install --frozen-lockfile
          pnpm build
          pnpm pack --pack-destination ../
          cd ..
          TARBALL=$(ls ember-source-*.tgz)
          echo "EMBER_TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Point demo app at packed ember-source
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.devDependencies['ember-source'] = 'file:./${{ env.EMBER_TARBALL }}';
            pkg.pnpm.overrides['ember-source'] = 'file:./${{ env.EMBER_TARBALL }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build demo app
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
